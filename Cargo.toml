[package]
name = "clipper"
version = "0.1.0"
edition = "2024"

[dependencies]
minijinja = { version = "2.1", features = ["loader"] }
arboard = "3.4"
serde = { version = "1.0", features = ["derive"] }
toml = "0.8"
serde_json = "1.0"
once_cell = "1.20"
rustmigemo = { git = "https://github.com/oguna/rustmigemo.git" }
regex = "1.11"
chrono = "0.4"
dirs = "5.0"

[build-dependencies]
embed-resource = "2.5"
